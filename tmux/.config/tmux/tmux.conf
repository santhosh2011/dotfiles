# ---- Prefix ----
unbind C-b
set -g prefix C-s
set -g prefix2 C-Space
bind C-s send-prefix
bind C-Space send-prefix -2

# ---- Environment ----
# Ensure Homebrew bins (tmux, fzf, zoxide) are on PATH for run-shell / plugins
set -g update-environment "PATH DISPLAY SSH_AUTH_SOCK"
set-environment -g PATH "$HOME/.local/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# ---- Options ----
set -g mouse on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
setw -g mode-keys vi

# Window names: fully manual. Apps can't rename via escapes, tmux won't
# auto-update — whatever you set with `prefix + ,` sticks.
set -g allow-rename off
set -g automatic-rename off

# True color
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# ---- Visual ----
# Active pane border in bright blue, inactive in muted surface; heavy lines
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa,bold'
set -g pane-border-lines heavy

# Subtle dim on inactive panes so the active one pops
set -g window-style 'fg=#a6adc8,bg=default'
set -g window-active-style 'fg=#cdd6f4,bg=default'

# Pane border title: index + running command + path (~ collapsed)
# Auto-hide when only one pane (less noise in solo windows)
set -g pane-border-status off
set -g pane-border-format ' #{?pane_active,#[fg=#89b4fa#,bold],#[fg=#6c7086]}#{pane_index} #{pane_current_command} #[default]· #(echo "#{pane_current_path}" | sed "s|$HOME|~|") '
set-hook -g window-layout-changed 'set -w pane-border-status #{?#{==:#{window_panes},1},off,top}'
set-hook -g after-split-window     'set -w pane-border-status top'
set-hook -g pane-exited            'set -w pane-border-status #{?#{==:#{window_panes},1},off,top}'

# ---- Keybinds ----
# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# Splits open in current path
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane nav (vi-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable with prefix held)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window nav without prefix
bind -n M-H previous-window
bind -n M-L next-window

# Copy mode: vi-style selection + macOS clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# Open pane's cwd in Finder
bind o run-shell "open #{pane_current_path}"

# New named session (triggered by Ghostty cmd+shift+n)
bind N command-prompt -p "Session name:" "new-session -s '%%'"

# ---- Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'catppuccin/tmux#v2.1.1'

# sessionx: fuzzy session picker (prefix + O)
set -g @sessionx-bind 'O'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '70%'
set -g @sessionx-window-width '70%'

# floax: floating scratch pane (prefix + p), menu on prefix + P
set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'

# thumbs: hint-style copy (prefix + space), yank to macOS clipboard
# lowercase hint = copy to clipboard, uppercase hint = open in default app (browser for URLs)
set -g @thumbs-key space
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'open {}'

# Resurrect / continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W '

# Inactive windows: dim, blends with status bar
set -g @catppuccin_window_number_color '#45475a'
set -g @catppuccin_window_text_color '#313244'
# Active window: solid lavender badge so it pops at a glance
set -g @catppuccin_window_current_number_color '#b4befe'
set -g @catppuccin_window_current_text_color '#b4befe'

set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_flags_icon_zoom ' '

# Init TPM (keep near bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# Status bar (AFTER tpm so catppuccin modules are registered)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=#1e1e2e#,bg=#f38ba8#,bold] PREFIX ,#{?pane_in_mode,#[fg=#1e1e2e#,bg=#f9e2af#,bold] COPY  ,#[fg=#1e1e2e#,bg=#a6e3a1#,bold]  #S   }}#[default] "
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_session}"

# Active window: rounded two-shade green pill with near-black text — mirrors
# the inactive structure (number badge + title segment) for visual harmony.
set -g window-status-current-format "#[fg=#a6e3a1,bg=default]#[fg=#11111b,bg=#a6e3a1,bold] #I #[fg=#11111b,bg=#7fb87f] #W#{?window_zoomed_flag, ,} #[fg=#7fb87f,bg=default]"
