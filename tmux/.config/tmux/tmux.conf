# ---- Prefix ----
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# ---- Options ----
set -g mouse on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
setw -g mode-keys vi

# True color
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# ---- Keybinds ----
# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# Splits open in current path
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane nav (vi-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable with prefix held)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window nav without prefix
bind -n M-H previous-window
bind -n M-L next-window

# Copy mode: vi-style selection + macOS clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# Open pane's cwd in Finder
bind o run-shell "open #{pane_current_path}"

# Sessionizer: fuzzy-pick a project dir and attach/create a session
bind f run-shell "tmux neww tmux-sessionizer"

# ---- Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.1'

# Resurrect / continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Init TPM (keep near bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# Status bar (AFTER tpm so catppuccin modules are registered)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_session}"
