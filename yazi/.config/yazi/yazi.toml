[mgr]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size_and_mtime"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
wrap         = "no"
tab_size     = 2
max_width    = 600
max_height   = 900
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
  { run = '/Applications/Zed.app/Contents/MacOS/cli -n "$@"', orphan = true, desc = "Open in Zed (new window)", for = "macos" },
]
open = [
  { run = 'open "$@"', for = "macos" },
]
reveal = [
  { run = 'open -R "$@"', desc = "Reveal in Finder", for = "macos" },
]
extract = [
  { run = 'unzip "$1" -d "${1%.zip}"', desc = "Extract zip", for = "macos" },
  { run = 'tar xf "$@"', desc = "Extract tar", for = "macos" },
]
play = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "text/*",              use = ["edit", "open"] },
  { mime = "application/json",   use = ["edit", "open"] },
  { mime = "image/*",            use = ["open"] },
  { mime = "{audio,video}/*",    use = ["play", "open"] },
  { mime = "application/pdf",    use = ["open"] },
]
append_rules = [
  { url = "*", use = "open" },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
suppress_preload = false

[log]
enabled = false
